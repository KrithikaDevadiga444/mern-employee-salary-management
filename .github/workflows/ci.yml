name: HRMS QA Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: db_penggajian3
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backend Dependencies
        working-directory: Backend
        run: npm install

      - name: Install Frontend Dependencies
        working-directory: Frontend
        run: npm install

      - name: Install Test Dependencies
        working-directory: tests
        run: npm install

      - name: Install Playwright Browsers
        working-directory: tests
        run: npx playwright install --with-deps

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Import Database
        run: |
          mysql -h127.0.0.1 -uroot db_penggajian3 < Backend/db/db_penggajian3.sql

      - name: Start Backend
        working-directory: Backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: ""
          DB_NAME: db_penggajian3
          PORT: 5000
        run: |
          nohup node index.js > backend.log 2>&1 &

      - name: Start Frontend
        working-directory: Frontend
        run: |
          nohup npm run dev -- --host 0.0.0.0 > frontend.log 2>&1 &

      - name: Wait for Servers
        run: sleep 30

      - name: Show Running Processes
        run: |
          ps -ef

      - name: Show Backend Log
        run: |
          cat Backend/backend.log || true

      - name: Show Frontend Log
        run: |
          cat Frontend/frontend.log || true

      - name: Run Playwright Tests
        working-directory: tests
        run: npx playwright test --reporter=line